<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multijugador - Pinta Gol</title>
  <link rel="stylesheet" href="css/multijugador.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Crimson+Pro:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="multiplayer-container">
    <canvas id="multiplayer-canvas" tabindex="0" role="application" aria-label="Juego: usa WASD para mover al astronauta"></canvas>

    <div id="multiplayer-overlay">
      <div class="overlay-topbar">
        <div class="hud-group">
          <div class="status-pill">Conectado al multijugador</div>
          <div id="multiplayer-player" class="hud-pill">Jugador: -</div>
          <div id="multiplayer-country" class="hud-pill">País conectado: -</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/libs/fflate.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="js/multiplayer/store.js"></script>
  <script src="js/multiplayer/assets.js"></script>
  <script src="js/multiplayer/game-scene.js"></script>
  <script src="js/multiplayer/game-controls.js"></script>
  <script src="js/multijugador.js"></script>
</body>
</html>
