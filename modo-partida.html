<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo de Partida - Pinta Gol</title>
  <link rel="stylesheet" href="css/modo-partida.css">
</head>
<body>
  <main class="modo-screen">
    <section class="modo-card">
      <h1>Selecciona el modo</h1>
      <p>Elige el tipo de partida que quieres buscar.</p>
      <div class="modo-actions">
        <button type="button" id="btn-modo-batalla" class="modo-btn modo-btn-batalla">Modo Batalla</button>
        <button type="button" id="btn-modo-zombie" class="modo-btn modo-btn-zombie">Modo Zombie</button>
      </div>
      <button type="button" id="btn-modo-volver" class="modo-back">Volver al lobby</button>
    </section>
  </main>
  <script src="js/modo-partida.js"></script>
</body>
</html>
