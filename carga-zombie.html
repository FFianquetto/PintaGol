<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando Partida Zombie - Pinta Gol</title>
  <link rel="stylesheet" href="css/carga-zombie.css">
</head>
<body data-bgm="halo">
  <main class="loading-screen-zombie">
    <section class="matchmaking-card-zombie" role="status" aria-live="polite">
      <div class="matchmaking-spinner-zombie"></div>
      <h1 id="zombie-title">Buscando partida Zombie...</h1>
      <p id="zombie-text">Emparejando jugadores del modo zombie.</p>
      <p id="zombie-player" class="zombie-line">Jugador:</p>
      <p id="zombie-weapon" class="zombie-line">Arma seleccionada:</p>
      <p id="zombie-count" class="zombie-count">0 / 4 jugadores conectados</p>
      <div id="zombie-users" class="zombie-users"></div>
      <section id="zombie-map-vote-panel" class="zombie-map-vote-panel" hidden>
        <h2>Votacion de mapa</h2>
        <p id="zombie-map-vote-text">Cuando esten los 4 jugadores, voten una estacion.</p>
        <div class="zombie-map-vote-actions">
          <button type="button" class="zombie-map-vote-btn" data-season="invierno">Invierno</button>
          <button type="button" class="zombie-map-vote-btn" data-season="primavera">Primavera</button>
          <button type="button" class="zombie-map-vote-btn" data-season="otono">Otono</button>
        </div>
        <p id="zombie-map-vote-picked" class="zombie-map-vote-picked"></p>
        <p id="zombie-map-vote-counts" class="zombie-map-vote-counts"></p>
      </section>
      <button type="button" id="btn-cancelar-zombie" class="zombie-cancel">Cancelar búsqueda</button>
    </section>
  </main>
  <script src="js/zombie/store-zombie.js"></script>
  <script src="js/zombie/matchmaking-zombie.js"></script>
  <script src="js/carga-zombie.js"></script>
  <script src="js/background-music.js"></script>
</body>
</html>
