<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puntuaciones - Pinta Gol</title>
  <link rel="stylesheet" href="css/puntuaciones.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-bgm="overture">
  <div id="puntuaciones-container">
    <canvas id="puntuaciones-canvas"></canvas>

    <div id="puntuaciones-overlay">
      <div id="puntuaciones-panel">
        <h2 id="puntuaciones-title">PUNTUACIONES</h2>
        <p id="puntuaciones-subtitle" class="puntuaciones-subtitle">
          Partidas ganadas (jugadores con Facebook e Instagram vinculados en Redes sociales). Usa <code>npm start</code> para ver datos en vivo.
        </p>

        <table id="tabla-puntuaciones">
          <thead>
            <tr>
              <th class="col-rango">Rango</th>
              <th class="col-jugador">Jugador</th>
              <th class="col-victorias">Victorias</th>
            </tr>
          </thead>
          <tbody id="tabla-puntuaciones-body">
            <tr><td colspan="3" class="tabla-msg">Cargando ranking…</td></tr>
          </tbody>
        </table>

        <button type="button" id="btn-volver">Volver al lobby</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="js/puntuaciones.js"></script>
  <script src="js/background-music.js"></script>
</body>
</html>
