<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelos (FBX / OBJ)</title>
  <link rel="stylesheet" href="css/modelo.css">
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="modelo-wrap">
    <canvas id="modelo-canvas" role="img" aria-label="Vista 3D: con el astronauta, WASD o flechas para mover"></canvas>
    <div id="modelo-hud">
      <span>Vista previa (~2.2 u). <strong>Astronauta</strong>: <strong>WASD</strong> o <strong>flechas</strong> para mover, clic en el lienzo para que el teclado responda. "Reducir movimiento" desactiva la flotación. El resto gira con la escena y la luz.</span>
      <label id="modelo-pick-wrap" for="modelo-pick">Modelo</label>
      <select id="modelo-pick" aria-label="Elegir modelo"></select>
      <span id="modelo-estado">Cargando…</span>
      <span id="modelo-detalle" class="modelo-det"></span>
      <a href="index.html">Lobby</a>
      <a href="multijugador.html">Multijugador</a>
    </div>
  </div>
  <script type="module" src="js/modelo.js"></script>
</body>
</html>
