<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redes sociales - Pinta Gol</title>
  <link rel="stylesheet" href="css/redes-sociales.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-bgm="overture">
  <div id="redes-container">
    <header id="redes-header">
      <h1>Redes sociales</h1>
      <p>Vincula tu perfil con el mismo correo: primero inicia sesión o regístrate, luego conecta Facebook o Instagram (Meta).</p>
    </header>

    <div id="aviso-config" role="status"></div>

    <section class="panel" id="panel-cuenta">
      <h2>Cuenta (correo)</h2>
      <label for="email">Correo</label>
      <input type="email" id="email" autocomplete="email" placeholder="tu@correo.com">
      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="Mínimo 6 caracteres">
      <div class="fila-btns">
        <button type="button" class="btn btn-prim" id="btn-registro">Registrarse</button>
        <button type="button" class="btn btn-sec" id="btn-login">Iniciar sesión</button>
        <button type="button" class="btn btn-ghost" id="btn-logout" hidden>Cerrar sesión</button>
      </div>
    </section>

    <section class="panel" id="panel-vincular">
      <h2>Vincular redes (mismo correo en Meta)</h2>
      <p id="estado-sesion" class="ok">Inicia sesión con correo para habilitar los enlaces.</p>
      <div class="fila-btns" style="margin-top:0.75rem">
        <button type="button" class="btn btn-facebook" id="btn-facebook" disabled>Facebook</button>
        <button type="button" class="btn btn-instagram" id="btn-instagram" disabled>Instagram</button>
      </div>
      <p id="log-lineas" aria-live="polite"></p>
    </section>

    <button type="button" id="btn-volver">Volver al lobby</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="config/firebase.config.js"></script>
  <script src="js/services/firebase-auth-client.js"></script>
  <script src="js/redes-sociales.js"></script>
  <script src="js/background-music.js"></script>
</body>
</html>
