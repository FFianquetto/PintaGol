<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redes sociales - Pinta Gol</title>
  <link rel="stylesheet" href="css/redes-sociales.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&display=swap" rel="stylesheet">
</head>
<body data-bgm="overture">
  <div id="fb-root"></div>
  <div id="redes-container">
    <header id="redes-header">
      <h1>Redes sociales</h1>
    </header>

    <div id="aviso-config" role="status"></div>

    <section class="panel" id="panel-cuenta">
      <h2>Correo de referencia</h2>
      <label for="email">Correo</label>
      <input type="email" id="email" autocomplete="email" placeholder="tu@correo.com">
      <div class="fila-btns">
        <button type="button" class="btn btn-prim" id="btn-guardar-correo">Guardar correo</button>
        <button type="button" class="btn btn-ghost" id="btn-logout" hidden>Cerrar sesión</button>
      </div>
    </section>

    <section class="panel" id="panel-vincular">
      <h2>Vincular con Facebook</h2>
      <p id="estado-sesion" class="ok" aria-live="polite"></p>
      <div class="fila-btns" style="margin-top:0.75rem">
        <button type="button" class="btn btn-facebook" id="btn-facebook" disabled>Facebook</button>
      </div>
    </section>

    <button type="button" id="btn-volver">Volver al lobby</button>
  </div>

  <script src="js/redes-sociales.js"></script>
  <script src="js/background-music.js"></script>
</body>
</html>
