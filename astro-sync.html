<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astronauta · vista sincronizada</title>
  <link rel="stylesheet" href="css/astro-sync.css">
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="astro-hud">
    <button type="button" id="astro-btn-ventana">Abrir 2.ª ventana</button>
    <span id="astro-player-name" class="astro-player-name" aria-live="polite"></span>
    <span id="astro-hint">WASD: astronauta · IJKO: arma 1 · CVBN: arma 2 (posiciones independientes del cuerpo)</span>
    <span id="estado-red" aria-live="polite"></span>
    <span id="astro-status"></span>
  </div>
  <canvas id="astro-canvas" tabindex="0" role="img" aria-label="WASD astronauta, IJKO y CVBN armas"></canvas>
  <script src="https://unpkg.com/three@0.160.0/examples/js/libs/fflate.min.js"></script>
  <script type="module" src="js/astro-sync.js"></script>
</body>
</html>
