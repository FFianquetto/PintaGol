<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astronauta · vista sincronizada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/astro-sync.css">
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body data-bgm="halo">
  <div id="astro-hud">
    <button type="button" id="astro-btn-ventana">Abrir 2.ª ventana</button>
    <span id="astro-player-name" class="astro-player-name" aria-live="polite"></span>
    <span id="astro-spectator-indicator" class="astro-spectator-indicator" hidden>Modo espectador: viendo partida</span>
    <span id="astro-hint">WASD: astronauta · CVBN: arma 2 · clic izquierdo: disparar bala</span>
    <span id="estado-red" aria-live="polite"></span>
    <span id="astro-status"></span>
  </div>
  <div id="astro-defeat-overlay" aria-live="polite" hidden>
    <div class="astro-defeat-card">
      <h2>Perdiste</h2>
      <p id="astro-defeat-text">Tu barra GameTag se llenó. Ahora estás en modo espectador.</p>
      <div class="astro-defeat-actions">
        <button type="button" id="astro-btn-watch" class="astro-defeat-btn astro-defeat-btn-watch">Ver partida</button>
        <button type="button" id="astro-btn-menu" class="astro-defeat-btn astro-defeat-btn-menu">Volver al menú principal</button>
      </div>
    </div>
  </div>
  <canvas id="astro-canvas" tabindex="0" role="img" aria-label="WASD astronauta, IJKO y CVBN armas"></canvas>
  <script src="https://unpkg.com/three@0.160.0/examples/js/libs/fflate.min.js"></script>
  <script type="module" src="js/astro-sync.js"></script>
  <script src="js/background-music.js"></script>
</body>
</html>
